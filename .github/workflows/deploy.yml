name: Deploy to Vercel (Production)

# Auto-deploys the app to Vercel on every push to main.
# Requires three repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       – a Vercel access token
#   VERCEL_ORG_ID      – the Vercel team/org id
#   VERCEL_PROJECT_ID  – the Vercel project id

# Manual trigger only (run from the Actions tab). The recommended automatic
# deploy-on-push path is the Vercel GitHub App (https://github.com/apps/vercel) —
# native git deploys. This workflow stays as a one-off / fallback deploy option
# and avoids creating runs while account-level deploy limits are in effect.
on:
  workflow_dispatch: {}

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
